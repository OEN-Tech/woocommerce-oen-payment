services:
  db:
    image: mariadb:11.4
    environment:
      MYSQL_DATABASE: wordpress
      MYSQL_USER: wordpress
      MYSQL_PASSWORD: wordpress
      MYSQL_ROOT_PASSWORD: root
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 5s
      timeout: 5s
      retries: 20
    volumes:
      - wp_runtime_db:/var/lib/mysql

  wordpress:
    image: wordpress:php8.2-apache
    depends_on:
      db:
        condition: service_healthy
    environment:
      WORDPRESS_DB_HOST: db:3306
      WORDPRESS_DB_USER: wordpress
      WORDPRESS_DB_PASSWORD: wordpress
      WORDPRESS_DB_NAME: wordpress
      OEN_API_BASE_URL: http://api-stub:8080
    ports:
      - "${WP_RUNTIME_PORT:-18080}:80"
    volumes:
      - wp_runtime_html:/var/www/html
      - ../..:/var/www/html/wp-content/plugins/woocommerce-oen-payment

  wpcli:
    image: wordpress:cli-php8.2
    depends_on:
      db:
        condition: service_healthy
      wordpress:
        condition: service_started
    user: "0:0"
    working_dir: /var/www/html
    environment:
      WORDPRESS_DB_HOST: db:3306
      WORDPRESS_DB_USER: wordpress
      WORDPRESS_DB_PASSWORD: wordpress
      WORDPRESS_DB_NAME: wordpress
      OEN_API_BASE_URL: http://api-stub:8080
    volumes:
      - wp_runtime_html:/var/www/html
      - ../..:/var/www/html/wp-content/plugins/woocommerce-oen-payment

  api-stub:
    image: php:8.2-cli
    working_dir: /app
    command: php -S 0.0.0.0:8080 tests/runtime/api-stub-router.php
    volumes:
      - ../..:/app

volumes:
  wp_runtime_db:
  wp_runtime_html:
